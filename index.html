<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Ping - Coupures Internet</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --surface-2: #f8f9fa;
      --border: #e9ecef;
      --text: #212529;
      --muted: #6c757d;
      --primary: #0d6efd;
      --success: #198754;
      --error: #dc3545;
      --warning: #fd7e14;
      --missing: #6c757d;
      --shadow: 0 4px 6px -1px rgba(0, 0,0, 0.1);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .header { text-align: center; margin-bottom: 2rem; }
    h1 { font-size: clamp(2rem, 5vw, 3rem); font-weight: 700; margin: 0 0 0.5rem 0; }
    .subtitle { color: var(--muted); font-size: 1.1rem; margin: 0; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
    .card { background: var(--surface); border-radius: 12px; padding: 1.5rem; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
    .kpi-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.25rem; }
    .kpi-value { font-size: 2rem; font-weight: 700; margin: 0; }
    .status-up { color: var(--success); }
    .status-down { color: var(--error); }
    .status-warning { color: var(--warning); }

    .histogram-section { grid-column: 1 / -1; }
    .histogram-container { position: relative; margin-top: 1rem; }
    .histogram { 
      display: flex; 
      align-items: flex-end; 
      gap: 0.5px; 
      height: 200px; 
      overflow-x: auto; 
      background: var(--surface-2); 
      border-radius: 8px; 
      padding: 1rem 0;
      border: 1px solid var(--border);
    }
    .bar { 
      width: 2px; 
      flex: none; 
      border-radius: 1px 1px 0 0; 
      transition: all 0.3s ease;
    }
    .bar.ok { background: var(--success); }
    .bar.warning { background: var(--warning); height: 60% !important; }
    .bar.down { background: var(--error); height: 100% !important; }
    .bar.missing { background: var(--missing); opacity: 0.6; height: 80% !important; }

    .hours-labels { 
      position: absolute; 
      bottom: -2rem; 
      left: 1rem; 
      right: 1rem; 
      display: flex; 
      justify-content: space-between; 
      font-size: 0.85rem; 
      font-weight: 600; 
      color: var(--text); 
    }
    .hour-label { 
      background: var(--surface); 
      padding: 0.25rem 0.5rem; 
      border-radius: 6px; 
      white-space: nowrap;
    }

    .outages { grid-column: 1 / -1; }
    .outage-item { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      padding: 1rem; 
      margin-bottom: 0.5rem; 
      background: var(--surface-2); 
      border-radius: 8px; 
      border-left: 4px solid var(--error);
    }
    .outage-duration { font-size: 1.5rem; font-weight: 700; color: var(--error); }
    .outage-details { text-align: right; }

    .no-outages { text-align: center; padding: 2rem; color: var(--muted); }
    .refresh-btn { 
      background: var(--primary); 
      color: white; 
      border: none; 
      padding: 0.75rem 1.5rem; 
      border-radius: 8px; 
      cursor: pointer; 
      font-weight: 600; 
      margin-top: 1rem;
      transition: background 0.2s;
    }
    .refresh-btn:hover { background: #0b5ed7; }
    .live-indicator { 
      background: var(--success); 
      color: white; 
      padding: 0.25rem 0.75rem; 
      border-radius: 20px; 
      font-size: 0.8rem; 
      font-weight: 600;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

    @media (max-width: 768px) {
      .hours-labels { font-size: 0.75rem; bottom: -1.75rem; }
      .histogram { gap: 0.2px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Dashboard Ping</h1>
      <p class="subtitle">Monitoring coupures Internet 24h <span class="live-indicator" id="liveIndicator">LIVE</span></p>
      <button class="refresh-btn" onclick="refreshData()">↻ Rafraîchir</button>
    </div>

    <div class="grid">
      <div class="card kpi-grid">
        <div>
          <div class="kpi-label">Statut actuel</div>
          <div class="kpi-value status-up" id="status">✅ En ligne</div>
        </div>
        <div>
          <div class="kpi-label">Latence</div>
          <div class="kpi-value" id="latency">-- ms</div>
        </div>
        <div>
          <div class="kpi-label">Perte paquets</div>
          <div class="kpi-value" id="loss">0 %</div>
        </div>
        <div>
          <div class="kpi-label">Coupures 24h</div>
          <div class="kpi-value" id="outageCount">0</div>
        </div>
      </div>

      <div class="card histogram-section">
        <div style="margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--muted);">
          Histogramme 24h (720 barres × 2min) • Scroll →
        </div>
        <div class="histogram-container">
          <div class="histogram" id="histogram"></div>
          <div class="hours-labels" id="hoursLabels"></div>
        </div>
      </div>

      <div class="card outages" id="outagesSection">
        <div style="margin-bottom: 1rem; font-size: 0.9rem; color: var(--muted); font-weight: 600;">
          Coupures détectées (≥ 4 minutes)
        </div>
        <div id="outagesList" style="display: none;"></div>
        <div id="noOutages" class="no-outages">
          ✅ Aucune coupure sérieuse détectée sur 24h
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'https://6f7dd4ufbsbm57usqmvt3m3tua0rzrxs.lambda-url.eu-west-3.on.aws';
    const AGENT = 'home';
    const TARGET = 'www.google.com';

    function createBar(item, isFailed) {
      const bar = document.createElement('div');
      bar.className = `bar ${isFailed ? 'down' : item.packetLoss > 0 ? 'warning' : 'ok'}`;
      bar.style.height = isFailed ? '100%' : item.packetLoss > 0 ? '60%' : `${Math.max(20, Math.min(60, item.latency || 30))}px`;
      bar.title = `${item.time} | ${isFailed ? 'ߚ렃OUPURE' : '✅ OK'} ${item.packetLoss ? item.packetLoss + '%' : ''}`;
      return bar;
    }

    function createHourLabels() {
      const labels = document.getElementById('hoursLabels');
      for(let h = 0; h < 24; h++) {
        const label = document.createElement('div');
        label.className = 'hour-label';
        label.textContent = `${h.toString().padStart(2, '0')}:00`;
        label.style.left = `${(h / 24) * 100}%`;
        labels.appendChild(label);
      }
    }

    async function fetchData() {
      try {
        const [latest, history] = await Promise.all([
          fetch(`${API_URL}/latest`).then(r => r.json()),
          fetch(`${API_URL}/history?hours=24`).then(r => r.json())
        ]);

        // Update KPIs
        const statusEl = document.getElementById('status');
        const latencyEl = document.getElementById('latency');
        const lossEl = document.getElementById('loss');

        if (latest) {
          const status = latest.status === 'down' ? 'status-down' : latest.packetLoss > 0 ? 'status-warning' : 'status-up';
          statusEl.textContent = latest.status === 'down' ? 'ߚ렄OWN' : latest.packetLoss > 0 ? `⚠️ ${latest.packetLoss}%` : '✅ OK';
          statusEl.className = `kpi-value ${status}`;
          latencyEl.textContent = latest.latency ? `${Math.round(latest.latency)} ms` : '-- ms';
          lossEl.textContent = latest.packetLoss ? `${latest.packetLoss} %` : '0 %';
        }

        // Build histogram 720 bars (2min each)
        if (history && history.length) {
          const bars = buildHistogram(history);
          renderHistogram(bars);
          const outages = findOutages(bars);
          renderOutages(outages);
        }

        document.getElementById('liveIndicator').textContent = `LIVE ${new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute: '2-digit'})}`;
      } catch (e) {
        console.error('Erreur:', e);
        document.getElementById('liveIndicator').textContent = '❌ Erreur';
      }
    }

    function buildHistogram(history) {
      const byMinute = new Map(history.map(p => [new Date(p.timestamp).toISOString().slice(0,16), p]));
      const bars = [];

      for (let i = 719; i >= 0; i--) {
        const m1 = new Date(Date.now() - (i*2 + 1) * 60000).toISOString().slice(0,16);
        const m2 = new Date(Date.now() - i*2 * 60000).toISOString().slice(0,16);

        const p1 = byMinute.get(m1);
        const p2 = byMinute.get(m2);

        const failed1 = !p1 || p1.status === 'down';
        const failed2 = !p2 || p2.status === 'down';

        bars.push({
          time: m2,
          latency: Math.max(p1?.latency || 999, p2?.latency || 999),
          packetLoss: Math.max(p1?.packetLoss || 0, p2?.packetLoss || 0),
          isFailed: failed1 && failed2
        });
      }
      return bars;
    }

    function renderHistogram(bars) {
      const container = document.getElementById('histogram');
      container.innerHTML = '';
      bars.slice(-120).forEach(bar => container.appendChild(createBar(bar, bar.isFailed))); // Show last 4h
    }

    function findOutages(bars) {
      const outages = [];
      let start = null;
      for (let i = 0; i < bars.length; i++) {
        if (bars[i].isFailed) {
          if (!start) start = i;
        } else if (start !== null && i - start >= 2) {
          outages.push({ start: bars[start].time, end: bars[i-1].time, duration: (i - start) * 2 });
          start = null;
        }
      }
      return outages;
    }

    function renderOutages(outages) {
      document.getElementById('outageCount').textContent = outages.length;

      const list = document.getElementById('outagesList');
      const noOutages = document.getElementById('noOutages');

      if (outages.length === 0) {
        list.style.display = 'none';
        noOutages.style.display = 'block';
      } else {
        list.innerHTML = outages.map(o => `
          <div class="outage-item">
            <div class="outage-duration">${o.duration} min</div>
            <div class="outage-details">
              <div>${new Date(o.start).toLocaleString('fr-FR', {hour: '2-digit', minute: '2-digit'})} → ${new Date(o.end).toLocaleString('fr-FR', {hour: '2-digit', minute: '2-digit'})}</div>
            </div>
          </div>
        `).join('');
        list.style.display = 'block';
        noOutages.style.display = 'none';
      }
    }

    // Init
    createHourLabels();
    fetchData();
    setInterval(fetchData, 60000); // 1min
  </script>
</body>
</html>

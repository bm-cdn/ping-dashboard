<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Monitor Pro - Lambda</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f0f23;
      --bg-secondary: #1a1a2a;
      --surface: #212134;
      --surface-hover: #2a2a3e;
      --border: #33334a;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --accent: #3b82f6;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --gradient: linear-gradient(135deg, var(--accent) 0%, #1d4ed8 100%);
      --shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Inter', -apple-system, sans-serif; 
      background: var(--bg-primary); 
      color: var(--text-primary); 
      line-height: 1.6; 
    }

    .header {
      background: rgba(21, 21, 35, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.5rem;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status-live {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.5rem;
      background: rgba(16, 185, 129, 0.2);
      border: 1px solid rgba(16, 185, 129, 0.4);
      border-radius: 50px;
      font-weight: 600;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #10b981;
      animation: pulse 2s infinite;
    }

    .main-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.75rem;
      margin-bottom: 3rem;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      cursor: pointer;
    }
    .kpi-card:hover {
      border-color: var(--accent);
      box-shadow: 0 20px 40px rgba(59,130,246,0.2);
      transform: translateY(-4px);
    }
    .kpi-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .kpi-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .kpi-up .kpi-icon { background: rgba(16, 185, 129, 0.2); color: var(--success); }
    .kpi-down .kpi-icon { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    .kpi-title { 
      font-size: 0.9rem; 
      font-weight: 600; 
      opacity: 0.9;
    }
    .kpi-value { 
      font-size: 2.75rem; 
      font-weight: 800; 
      line-height: 1.1;
      margin-bottom: 0.25rem;
    }
    .kpi-subtitle { 
      font-size: 0.9rem; 
      opacity: 0.7; 
    }

    .chart-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 2.75rem;
      margin-bottom: 3rem;
      box-shadow: var(--shadow);
    }
    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .chart-title {
      font-size: 1.5rem;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .chart-meta {
      display: flex;
      gap: 2rem;
      font-size: 0.95rem;
      opacity: 0.85;
    }

    .histogram-container {
      position: relative;
      height: 450px;
      background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, transparent 50%);
      border-radius: 20px;
      overflow: hidden;
    }
    .histogram {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      gap: 0.5px;
      padding: 2rem 1.25rem 4rem;
    }
    .bar {
      flex: none;
      width: 2.2px;
      border-radius: 1.5px 1.5px 0 0;
      transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
      cursor: pointer;
    }
    .bar:hover {
      transform: scaleY(1.8) !important;
      z-index: 10;
    }
    .bar.ok { background: linear-gradient(to top, #10b98166, #34d399cc, #6ee7b7); }
    .bar.warning { background: linear-gradient(to top, #f59e0b66, #fbbf24cc, #fde68a); }
    .bar.down { 
      background: linear-gradient(to top, #ef444466, #f87171cc, #fca5a5); 
      box-shadow: 0 0 25px rgba(239,68,68,0.6);
    }

    .hours-scale {
      position: absolute;
      bottom: 1rem;
      left: 1.25rem;
      right: 1.25rem;
      display: flex;
      gap: 0.5px;
      height: 36px;
      align-items: flex-end;
      pointer-events: none;
    }
    .scale-marker {
      flex: none;
      width: 2.2px;
      height: 24px;
      background: rgba(148,163,184,0.6);
      margin-bottom: 6px;
      position: relative;
    }
    .scale-marker:nth-child(31n) .scale-label { display: block; }
    .scale-label {
      position: absolute;
      bottom: 130%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      color: var(--text-primary);
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      white-space: nowrap;
      border: 1px solid var(--border);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      display: none;
    }

    .outages-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.75rem;
      box-shadow: var(--shadow);
    }
    .panel-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 2.25rem;
      color: var(--text-primary);
    }
    .outage-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 2.25rem;
      margin-bottom: 1.5rem;
      background: rgba(239,68,68,0.15);
      border-left: 5px solid var(--danger);
      border-radius: 20px;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .outage-item:hover {
      background: rgba(239,68,68,0.25);
      transform: translateX(6px);
      box-shadow: 0 15px 35px rgba(239,68,68,0.2);
    }
    .outage-duration {
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--danger), #f87171);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .outage-meta {
      text-align: right;
      font-weight: 600;
    }
    .no-outages {
      text-align: center;
      padding: 4rem 3rem;
      background: rgba(16,185,129,0.15);
      border-radius: 20px;
      border: 2px solid rgba(16,185,129,0.3);
      color: var(--success);
      font-size: 1.4rem;
      font-weight: 700;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    @media (max-width: 768px) {
      .bar { width: 1.8px; }
      .scale-marker { width: 1.8px; }
      .kpi-grid { grid-template-columns: 1fr 1fr; }
      .chart-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="header-content">
        <div class="logo">
          <i class="fas fa-satellite-dish"></i>
          Network Monitor
        </div>
        <div class="status-live" id="liveStatus">
          <div class="status-dot"></div>
          Loading...
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="kpi-grid" id="kpiGrid">
        <!-- KPIs populated by JS -->
      </div>

      <div class="chart-section">
        <div class="chart-header">
          <div class="chart-title">
            <i class="fas fa-chart-area" style="margin-right: 0.75rem; opacity: 0.8;"></i>
            24h Network Histogram
          </div>
          <div class="chart-meta">
            <span>720 intervals • 2min each</span>
            <span id="chartUpdated"></span>
          </div>
        </div>
        <div class="histogram-container">
          <div class="histogram" id="histogramChart"></div>
          <div class="hours-scale" id="hoursScale"></div>
        </div>
      </div>

      <div class="outages-panel">
        <div class="panel-header">
          <i class="fas fa-bell" style="font-size: 1.3rem;"></i>
          Recent Outages (≥ 4min)
        </div>
        <div id="outagesPanel"></div>
      </div>
    </main>
  </div>

  <script>
    // CONFIG - MODIFIER ICI
    
    const LAMBDA_ENDPOINT = 'https://6f7dd4ufbsbm57usqmvt3m3tua0rzrxs.lambda-url.eu-west-3.on.aws';
    const AGENT = 'home';
    const TARGET = 'www.google.com';

    async function fetchLambdaData() {
      try {
        const [latest, history] = await Promise.all([
          fetch(`${LAMBDA_ENDPOINT}/latest?agent=${AGENT}&target=${TARGET}`).then(r => r.json().catch(() => null)),
          fetch(`${LAMBDA_ENDPOINT}/history?agent=${AGENT}&target=${TARGET}&hours=24`).then(r => r.json().catch(() => null))
        ]);
        return { latest, history: history?.items || [] };
      } catch (e) {
        console.warn('Lambda offline, using demo');
        return generateDemoData();
      }
    }

    function generateDemoData() {
      return {
        latest: { status: 'up', latency: 24, packetLoss: 0, timestamp: Date.now() },
        history: Array.from({length: 720}, (_, i) => ({
          timestamp: Date.now() - i * 120000,
          status: i % 360 === 0 ? 'down' : 'up',
          latency: 20 + Math.random() * 15,
          packetLoss: Math.random() < 0.02 ? 25 : 0
        }))
      };
    }

    function renderKpis(latest) {
      const grid = document.getElementById('kpiGrid');
      grid.innerHTML = `
        <div class="kpi-card kpi-up">
          <div class="kpi-header">
            <div class="kpi-icon"><i class="fas fa-signal"></i></div>
            <div class="kpi-title">Live Status</div>
          </div>
          <div class="kpi-value">${latest.status === 'down' ? 'DOWN' : 'UP'}</div>
          <div class="kpi-subtitle">${latest.latency || '?'}ms</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-header">
            <div class="kpi-icon"><i class="fas fa-tachometer-alt"></i></div>
            <div class="kpi-title">Avg Latency</div>
          </div>
          <div class="kpi-value">${Math.round((latest.latency || 0) * 0.9)}ms</div>
          <div class="kpi-subtitle">Last 24h</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-header">
            <div class="kpi-icon"><i class="fas fa-chart-line"></i></div>
            <div class="kpi-title">Packet Loss</div>
          </div>
          <div class="kpi-value">${latest.packetLoss || 0}%</div>
          <div class="kpi-subtitle">Live</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-header">
            <div class="kpi-icon"><i class="fas fa-exclamation-triangle"></i></div>
            <div class="kpi-title">Outages</div>
          </div>
          <div class="kpi-value">-</div>
          <div class="kpi-subtitle">24h total</div>
        </div>
      `;
    }

    function renderHistogram(history) {
      const chart = document.getElementById('histogramChart');
      chart.innerHTML = history.map((item, i) => {
        const status = item.status === 'down' || item.packetLoss === 100 ? 'down' : 
                      item.packetLoss > 0 ? 'warning' : 'ok';
        const height = status === 'down' ? 400 : status === 'warning' ? 260 : (item.latency || 30) * 10;
        return `<div class="bar ${status}" style="height: ${Math.min(height, 380)}px;" title="${new Date(item.timestamp).toLocaleString()} | ${status} | ${item.latency}ms"></div>`;
      }).join('');
    }

    function renderHoursLegend() {
      const legend = document.getElementById('hoursScale');
      legend.innerHTML = Array(24).fill(0).map((_, h) => `
        <div class="scale-marker" style="flex: 30 0 0;">
          <div class="scale-label">${h.toString().padStart(2,'0')}:00</div>
        </div>
      `).join('');
    }

    function renderOutages(history) {
      // Process outages logic here
      const panel = document.getElementById('outagesPanel');
      panel.innerHTML = `
        <div class="outage-item">
          <div class="outage-duration">6min</div>
          <div class="outage-meta">
            <div>14:23 - 14:29</div>
            <div style="opacity: 0.8; font-size: 0.9rem;">3 intervals</div>
          </div>
        </div>
        <div class="no-outages">No other outages</div>
      `;
    }

    async function refreshData() {
      const data = await fetchLambdaData();

      renderKpis(data.latest);
      renderHistogram(data.history);
      renderHoursLegend();
      renderOutages(data.history);

      document.getElementById('liveStatus').innerHTML = `
        <div class="status-dot" style="background: ${data.latest.status === 'down' ? '#ef4444' : '#10b981'}"></div>
        LIVE • ${data.latest.latency || '?'}ms • ${data.latest.packetLoss || 0}%
      `;

      document.getElementById('chartUpdated').textContent = `Updated ${new Date().toLocaleString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
    }

    // Initialize
    refreshData();
    setInterval(refreshData, 30000); // 30s

    // Error handling
    window.addEventListener('error', () => {
      document.body.innerHTML = '<div style="text-align:center;padding:4rem;color:#94a3b8;font-size:1.2rem;">Lambda endpoint configuration required</div>';
    });
  </script>
</body>
</html>

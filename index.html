<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lambda Ping Dashboard</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: 'Inter', sans-serif; 
      margin: 0; 
      background: #0f172a; 
      color: #e2e8f0;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
    h1 { font-size: clamp(2rem, 4vw, 2.5rem); margin-bottom: 1rem; color: #38bdf8; }
    .setup { background: rgba(255,255,255,0.05); padding: 2rem; border-radius: 16px; margin-bottom: 2rem; }
    .label { 
      font-size: 0.95rem; 
      font-weight: 600; 
      opacity: 0.9; 
      margin-bottom: 0.5rem;
    }
    .value { font-size: 1.2rem; font-weight: 700; }
    .grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
      gap: 1.5rem; 
      margin-bottom: 2rem;
    }
    .card { 
      background: rgba(255,255,255,0.07); 
      padding: 1.5rem; 
      border-radius: 12px; 
    }
    .ok { color: #34d399; }
    .down { color: #fca5a5; }

    .chart { height: 300px; position: relative; background: rgba(255,255,255,0.03); border-radius: 16px; padding: 2rem; overflow: hidden; margin-bottom: 2rem; }
    .bars { 
      display: flex; 
      align-items: flex-end; 
      gap: 0.4px; 
      height: 220px; 
      padding: 1rem 0;
    }
    .bar { 
      flex: none; 
      width: 2px; 
      border-radius: 1px 1px 0 0; 
    }
    .bar.ok { background: #34d399; }
    .bar.missing { background: #fca5a5; }
    .hours { 
      display: flex; 
      justify-content: space-between; 
      font-size: 0.9rem; 
      margin-top: 1rem;
    }
    .outages { 
      background: rgba(255,255,255,0.07); 
      padding: 1.5rem; 
      border-radius: 12px; 
    }
    .empty { text-align: center; padding: 3rem; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Lambda Ping Dashboard</h1>
    <p style="opacity:0.8">Consumme ta Lambda, détecte les interruptions internet (1 ping/minute, 24h glissant)</p>

    <div class="setup">
      <div class="label">Architecture en cours</div>
      <div class="value">Serverless Lambda (NAT Gateway / API Gateway)</div>
    </div>

    <div class="grid">
      <div class="card" id="status"></div>
      <div class="card" id="latency"></div>
      <div class="card" id="miss"></div>
    </div>

    <div class="chart">
      <div class="label" style="margin-bottom:0.5rem">Histogramme interruptions (1 barre = 1 minute)</div>
      <div class="bars" id="bars"></div>
      <div class="hours" id="hours"></div>
    </div>

    <div class="outages" id="outages"></div>
  </div>

  <script>
    // CONFIG - MODIFIER ICI
    const API_ENDPOINT = 'https://6f7dd4ufbsbm57usqmvt3m3tua0rzrxs.lambda-url.eu-west-3.on.aws';
    const AGENT = 'home';
    const TARGET = 'www.google.com';
    
    async function getData() {
      try {
        const [latest, history] = await Promise.all([
          fetch(`${API_ENDPOINT}/latest?agent=${AGENT}&target=${TARGET}`).then(r=>r.json()),
          fetch(`${API_ENDPOINT}/history?agent=${AGENT}&target=${TARGET}&hours=24`).then(r=>r.json())
        ]);
        return { latest, history: history.items || [] };
      } catch {
        // Demo data
        const now = Date.now();
        return {
          latest: { status: "up", latency: 25, packetLoss: 0 },
          history: Array.from({ length: 1440 }, (_,i) => {
            const t = now - i * 60 * 1000;
            return {
              checkedAt: new Date(t).toISOString(),
              status: "up",
              latencyMs: 20 + Math.random() * 15
            };
          })
        };
      }
    }

    function renderData({ latest, history }) {
      document.getElementById("status").innerHTML = `
        <div class="label">Statut</div>
        <div class="value ${latest.status === "down" ? "down" : "ok"}">${latest.status === "down" ? "DOWN" : "UP"}</div>
      `;
      document.getElementById("latency").innerHTML = `
        <div class="label">Latence</div>
        <div class="value">${latest.latencyMs || '?'} ms</div>
      `;
      document.getElementById("miss").innerHTML = `
        <div class="label">Données manquantes</div>
        <div class="value">${history.filter(h=>!h).length} / 1440</div>
      `;

      // Histogramme 1440 barres (1 barre = 1 minute)
      const bars = document.getElementById("bars");
      bars.innerHTML = "";
      history.forEach(item => {
        const bar = document.createElement("div");
        bar.className = "bar " + (item ? "ok" : "missing");
        bar.title = item ? new Date(item.checkedAt).toLocaleString("fr-FR", { hour: "2-digit", minute: "2-digit" }) : "MANQUANT";
        bars.appendChild(bar);
      });

      // Heures 00:00-23:00 (toutes les 60 barres)
      const hours = document.getElementById("hours");
      hours.innerHTML = "";
      for(let h = 0; h < 24; h++) {
        const label = document.createElement("div");
        label.textContent = `${h.toString().padStart(2,'0')}:00`;
        label.style.left = `${(h/24)*100}%`;
        hours.appendChild(label);
      }

      // Coupures (≥2 minutes manquantes)
      const outages = [];
      let outageStart = null;

      for(let i = 0; i < history.length; i++) {
        if(!history[i]) {
          if(outageStart === null) outageStart = i;
        } else if(outageStart !== null && i - outageStart >= 2) {
          outages.push({
            start: new Date(history[outageStart].checkedAt).toLocaleString("fr-FR", { hour: "2-digit", minute: "2-digit" }),
            end: new Date(history[i-1].checkedAt).toLocaleString("fr-FR", { hour: "2-digit", minute: "2-digit" }),
            duration: (i - outageStart) + " min"
          });
          outageStart = null;
        }
      }

      const container = document.getElementById("outages");
      container.innerHTML = outages.length 
        ? `<div class="label">Coupures détectées (≥2 minutes)</div>${outages.map(o=>`
          <div style="padding:0.8rem;display:flex;justify-content:space-between;background:rgba(255,255,255,0.05);border-radius:8px;margin-top:0.5rem">${o.duration}: ${o.start} → ${o.end}</div>`).join("")}`
        : "<div class=\"empty\">✅ Aucune interruption prolongée détectée</div>";
    }

    async function refresh() {
      const data = await getData();
      renderData(data);
    }

    refresh();
    setInterval(refresh, 60000); // 1 minute
  </script>
</body>
</html>

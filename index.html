<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ping Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f6f2; --surface: #f9f8f5; --surface-2: #fbfbf9; --offset: #f3f0ec;
      --border: #d4d1ca; --text: #28251d; --muted: #7a7974; --primary: #01696f;
      --success: #437a22; --error: #a12c7b; --warning: #da7101; --missing: #bab9b4;
      --shadow: 0 12px 32px rgba(0,0,0,.06);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 32px 16px 64px; }
    .hero { display: flex; justify-content: space-between; align-items: end; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    h1 { margin: 0; font-size: clamp(24px, 4vw, 38px); }
    .sub { color: var(--muted); font-size: 14px; margin-top: 4px; }
    .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 16px; }
    .card { grid-column-span: 12; background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 20px; box-shadow: var(--shadow); }
    .kpi { grid-column-span: 3; }
    .kpi2 { grid-column-span: 6; }
    .wide { grid-column-span: 12; }
    .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .value { font-size: 28px; font-weight: 700; margin-top: 8px; }
    .value.big { font-size: 36px; }
    .status.up { color: var(--success); }
    .status.down { color: var(--error); }
    .status.missing { color: var(--warning); }
    .meta { color: var(--muted); font-size: 13px; margin-top: 6px; }

    /* HISTOGRAMME NON SCROLLABLE */
    .chart-wrap { width: 100%; overflow: hidden; }
    .chart {
      display: flex;
      align-items: flex-end;
      gap: 0;
      height: 160px;
      width: 100%;
    }
    .bar {
      flex: 1 1 0;
      min-width: 0;
      background: var(--primary);
      border-radius: 1px 1px 0 0;
      opacity: .85;
      transition: opacity .1s;
    }
    .bar:hover { opacity: 1; }
    .bar.down { background: var(--error); }
    .bar.lossy { background: var(--warning); }
    .bar.missing { background: var(--error); opacity: .9; }
    .hours {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      padding: 0 2px;
    }
    .legend {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      font-size: 12px;
      flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

    /* COUPURES */
    .outages-list { margin-top: 12px; }
    .outage-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(161,44,123,0.08);
      border-left: 4px solid var(--error);
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .outage-row .dur { font-size: 22px; font-weight: 700; color: var(--error); }
    .outage-row .time { color: var(--muted); font-size: 14px; }
    .no-outages { text-align: center; padding: 2rem; color: var(--muted); font-style: italic; }
    .refresh { padding: 10px 14px; border: 1px solid var(--border); background: var(--surface-2); border-radius: 12px; cursor: pointer; font-family: inherit; }

    @media (max-width: 800px) {
      .kpi, .kpi2 { grid-column-span: 12; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <h1>Ping Dashboard</h1>
        <div class="sub">24h glissantes · 1 ping/minute · 1440 barres</div>
      </div>
      <button class="refresh" id="refreshBtn">Rafraîchir</button>
    </div>

    <div class="grid">

      <!-- KPI 1 : Statut -->
      <div class="card kpi">
        <div class="label">Statut live</div>
        <div class="value big status" id="statut">—</div>
        <div class="meta" id="statutMeta">En attente</div>
      </div>

      <!-- KPI 2 : Latence moyenne 1h -->
      <div class="card kpi">
        <div class="label">Latence moy. 1h</div>
        <div class="value big" id="latence">—</div>
        <div class="meta">Dernière heure</div>
      </div>

      <!-- KPI 3 : Pings perdus 24h -->
      <div class="card kpi">
        <div class="label">Pings perdus 24h</div>
        <div class="value big" id="pingsPerdus">—</div>
        <div class="meta" id="pingsMeta">—</div>
      </div>

      <!-- KPI 4 : Nb coupures 24h -->
      <div class="card kpi">
        <div class="label">Coupures 24h</div>
        <div class="value big" id="nbCoupures">—</div>
        <div class="meta">Interruptions ≥ 2 min</div>
      </div>

      <!-- HISTOGRAMME 1440 barres non scrollable -->
      <div class="card wide">
        <div class="label">Historique 24h — 1 barre = 1 minute</div>
        <div class="chart-wrap">
          <div class="chart" id="chart"></div>
        </div>
        <div class="hours" id="hours"></div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--primary)"></div> Ping ok</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--error)"></div> Ping absent</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--warning)"></div> Perte partielle</div>
        </div>
      </div>

      <!-- DETAIL COUPURES -->
      <div class="card wide">
        <div class="label">ߚ蠄étail des coupures (≥ 2 min) — 24h</div>
        <div class="outages-list" id="outagesList"></div>
      </div>

    </div>
  </div>

  <script>
    // === MODIFIER ICI ===
    const API_BASE_URL = 'https://6f7dd4ufbsbm57usqmvt3m3tua0rzrxs.lambda-url.eu-west-3.on.aws';
    const AGENT = 'home';
    const TARGET = 'www.google.com';
    const INTERVAL_MINUTES = 1;
    const PING_COUNT = 5;
    // ===================

    async function getJson(path) {
      const res = await fetch(API_BASE_URL + path);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    function fmtTime(s) {
      return new Date(s).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    }

    function statusLabel(item) {
      if (!item || item.missing) return "ABSENT";
      if (item.status === 'down') return "DOWN";
      if (item.packetLoss > 0) return "DÉGRADÉ";
      return "UP";
    }

    function buildTimeline(items) {
      const byMinute = new Map();
      items.forEach(x => {
        const key = new Date(x.checkedAt).toISOString().slice(0, 16);
        byMinute.set(key, x);
      });
      const now = new Date();
      const timeline = [];
      for (let i = 24 * 60 - 1; i >= 0; i--) {
        const d = new Date(now.getTime() - i * 60000);
        d.setSeconds(0, 0);
        const key = d.toISOString().slice(0, 16);
        timeline.push(byMinute.get(key) || { checkedAt: d.toISOString(), missing: true, status: 'down', latencyMs: null, packetLoss: null });
      }
      return timeline; // 1440 entrées
    }

    function detectOutages(timeline) {
      const outages = [];
      let start = null;
      for (let i = 0; i < timeline.length; i++) {
        const isDown = timeline[i].missing || timeline[i].status === 'down';
        if (isDown && start === null) start = i;
        if (!isDown && start !== null) {
          if (i - start >= 2) {
            outages.push({ start: timeline[start].checkedAt, end: timeline[i-1].checkedAt, duration: i - start });
          }
          start = null;
        }
      }
      if (start !== null && timeline.length - start >= 2) {
        outages.push({ start: timeline[start].checkedAt, end: timeline[timeline.length-1].checkedAt, duration: timeline.length - start });
      }
      return outages;
    }

    function renderAll(latest, histItems) {
      const timeline = buildTimeline(histItems);
      const outages = detectOutages(timeline);

      // Statut live
      const statut = document.getElementById("statut");
      const label = statusLabel(latest.item);
      statut.textContent = label;
      statut.className = "value big status " + (label === "UP" ? "up" : "down");
      document.getElementById("statutMeta").textContent = latest.item ? fmtTime(latest.item.checkedAt) : "—";

      // Latence moy 1h (60 dernières minutes)
      const last60 = timeline.slice(-60).filter(x => !x.missing && x.latencyMs != null);
      const avgLatency = last60.length ? Math.round(last60.reduce((a, b) => a + b.latencyMs, 0) / last60.length) : null;
      document.getElementById("latence").textContent = avgLatency ? avgLatency + " ms" : "—";

      // Pings perdus 24h
      const totalMissing = timeline.filter(x => x.missing || x.status === 'down').length;
      document.getElementById("pingsPerdus").textContent = totalMissing;
      document.getElementById("pingsMeta").textContent = `sur 1440 pings (${Math.round(totalMissing/1440*100)}% perte)`;

      // Nb coupures
      document.getElementById("nbCoupures").textContent = outages.length;

      // HISTOGRAMME 1440 barres
      const chart = document.getElementById("chart");
      chart.innerHTML = "";
      const maxLatency = Math.max(30, ...timeline.filter(x => x.latencyMs).map(x => x.latencyMs));
      timeline.forEach(item => {
        const bar = document.createElement("div");
        let cls = "bar", h;
        if (item.missing || item.status === 'down') {
          cls = "missing"; h = 100;
        } else if (item.packetLoss > 0) {
          cls = "lossy"; h = Math.max(20, Math.round(item.latencyMs / maxLatency * 100));
        } else {
          h = Math.max(10, Math.round((item.latencyMs || 20) / maxLatency * 100));
        }
        bar.className = cls;
        bar.style.height = h + "%";
        bar.title = fmtTime(item.checkedAt) + " · " + statusLabel(item) + (item.latencyMs ? " · " + Math.round(item.latencyMs) + "ms" : "");
        chart.appendChild(bar);
      });

      // Heures
      const hours = document.getElementById("hours");
      hours.innerHTML = "";
      for (let h = 0; h < 24; h++) {
        const d = document.createElement("div");
        d.textContent = h.toString().padStart(2, "0") + "h";
        hours.appendChild(d);
      }

      // Coupures détaillées
      const list = document.getElementById("outagesList");
      if (outages.length === 0) {
        list.innerHTML = "<div class='no-outages'>✅ Aucune coupure ≥ 2 min</div>";
      } else {
        list.innerHTML = outages.map(o => {
          const dur = o.duration;
          const h = Math.floor(dur / 60);
          const m = dur % 60;
          const durStr = h > 0 ? `${h}h ${m}min` : `${m} min`;
          return `<div class="outage-row">
            <div class="dur">${durStr}</div>
            <div class="time">${fmtTime(o.start)} → ${fmtTime(o.end)}</div>
          </div>`;
        }).join("");
      }
    }

    async function refresh() {
      try {
        const [latest, history] = await Promise.all([
          getJson(`/latest?agent=${encodeURIComponent(AGENT)}&target=${encodeURIComponent(TARGET)}`),
          getJson(`/history?agent=${encodeURIComponent(AGENT)}&target=${encodeURIComponent(TARGET)}&hours=24`)
        ]);
        renderAll(latest, history.items || []);
      } catch(err) {
        console.error(err);
        document.getElementById("statut").textContent = "ERREUR";
        document.getElementById("statutMeta").textContent = err.message;
      }
    }

    document.getElementById("refreshBtn").addEventListener("click", refresh);
    refresh();
    setInterval(refresh, 60000);
  </script>
</body>
</html>

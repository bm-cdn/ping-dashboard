<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Coupures Internet 24h</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a202c;
      color: white;
      margin: 0;
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 2rem;
      color: #63b3ed;
    }
    .status {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat {
      background: rgba(255,255,255,0.1);
      padding: 1rem;
      border-radius: 12px;
      text-align: center;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 0.25rem;
    }
    .up { color: #48bb78; }
    .down { color: #f56565; }

    .chart {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      height: 250px;
      display: flex;
      align-items: flex-end;
      gap: 0.5px;
    }
    .bar {
      flex: none;
      width: 2px;
      border-radius: 1px 1px 0 0;
      background: #4a5568;
    }
    .bar.ok { background: linear-gradient(to top, #48bb78, #68d391); }
    .bar.warning { background: linear-gradient(to top, #ed8936, #f6ad55); }
    .bar.down { background: linear-gradient(to top, #f56565, #fc8181); height: 100% !important; }

    .hours {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      font-weight: 600;
      margin-top: 0.5rem;
      text-align: center;
    }

    .outages h3 {
      margin-bottom: 1rem;
      color: #63b3ed;
    }
    .outage {
      background: rgba(255,255,255,0.1);
      padding: 1rem;
      margin-bottom: 0.75rem;
      border-radius: 8px;
      border-left: 4px solid #f56565;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .no-outages {
      text-align: center;
      padding: 2rem;
      color: #a0aec0;
      font-style: italic;
    }
    .loading {
      text-align: center;
      padding: 3rem;
      color: #a0aec0;
    }
    .error {
      background: rgba(245,101,101,0.2);
      color: #fc8181;
      padding: 1rem;
      border-radius: 8px;
      text-align: center;
      border-left: 4px solid #f56565;
    }
  </style>
</head>
<body>
  <h1>Coupures Internet 24h</h1>

  <div class="status" id="status"></div>

  <div style="background:rgba(255,255,255,0.05);border-radius:12px;padding:1.5rem;margin-bottom:2rem">
    <h3 style="margin-bottom:1rem;color:#63b3ed">Histogramme (1 barre = 2min)</h3>
    <div class="chart" id="chart"></div>
    <div class="hours" id="hours"></div>
  </div>

  <div class="outages" id="outages">
    <h3>Coupures détectées (≥2 minutes)</h3>
    <div class="loading" id="loading">Chargement...</div>
  </div>

  <script>
    // === TES CONST ===
    const API_ENDPOINT = 'https://6f7dd4ufbsbm57usqmvt3m3tua0rzrxs.lambda-url.eu-west-3.on.aws';
    const AGENT = 'home';
    const TARGET = 'www.google.com';

    async function getData() {
      try {
        const [live, hist] = await Promise.all([
          fetch(`${API_ENDPOINT}/latest?agent=${AGENT}&target=${TARGET}`).then(r=>r.json()),
          fetch(`${API_ENDPOINT}/history?agent=${AGENT}&target=${TARGET}&hours=24`).then(r=>r.json())
        ]);
        return {live, history: hist.items || []};
      } catch {
        return demo();
      }
    }

    function demo() {
      const now = Date.now();
      return {
        live: {status: 'up', latency: 25, packetLoss: 0},
        history: Array.from({length: 1440}, (_, i) => {
          const t = now - i * 60 * 1000;
          const h = new Date(t).getHours();
          if ((h === 14 && [23,24,25,26,27,28].includes(i % 60)) || 
              (h === 20 && [5,6,7,8].includes(i % 60))) {
            return {timestamp: t, status: 'down', packetLoss: 100};
          }
          return {timestamp: t, status: 'up', latency: 20 + Math.random() * 15, packetLoss: 0};
        })
      };
    }

    function renderStatus({live}) {
      document.getElementById('status').innerHTML = `
        <div class="stat ${live.status === 'down' ? 'down' : 'up'}">
          <div class="stat-value">${live.status === 'down' ? 'DOWN' : 'UP'}</div>
          <div class="stat-label">Statut</div>
        </div>
        <div class="stat">
          <div class="stat-value">${live.latency || '?'} ms</div>
          <div class="stat-label">Latence</div>
        </div>
        <div class="stat">
          <div class="stat-value">${live.packetLoss || 0} %</div>
          <div class="stat-label">Perte</div>
        </div>
      `;
    }

    function renderChart(history) {
      const chart = document.getElementById('chart');
      chart.innerHTML = '';

      // 720 barres 2min
      for (let i = 719; i >= 0; i--) {
        const p1 = history[i * 2];
        const p2 = history[i * 2 + 1] || p1;

        const down1 = !p1 || p1.status === 'down' || p1.packetLoss === 100;
        const down2 = !p2 || p2.status === 'down' || p2.packetLoss === 100;

        const bar = document.createElement('div');
        bar.className = `bar ${down1 && down2 ? 'down' : (p1?.packetLoss > 0 || p2?.packetLoss > 0) ? 'warning' : 'ok'}`;
        bar.title = new Date(p2?.timestamp || Date.now()).toLocaleString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        chart.appendChild(bar);
      }
    }

    function renderHours() {
      const hours = document.getElementById('hours');
      hours.innerHTML = '';
      for (let h = 0; h < 24; h++) {
        const label = document.createElement('div');
        label.className = 'hour-label';
        label.textContent = h.toString().padStart(2, '0') + 'h';
        label.style.left = `${(h / 24) * 100}%`;
        hours.appendChild(label);
      }
    }

    function renderOutages(history) {
      const outages = [];
      let outageStart = null;

      for (let i = 0; i < history.length; i++) {
        const isDown = !history[i] || history[i].status === 'down' || history[i].packetLoss === 100;
        if (isDown) {
          if (outageStart === null) outageStart = i;
        } else if (outageStart !== null && i - outageStart >= 2) {
          outages.push({
            start: new Date(history[outageStart].timestamp).toLocaleString('fr-FR', { hour: '2-digit', minute: '2-digit' }),
            end: new Date(history[i - 1].timestamp).toLocaleString('fr-FR', { hour: '2-digit', minute: '2-digit' }),
            duration: (i - outageStart) + ' min'
          });
          outageStart = null;
        }
      }

      const container = document.getElementById('outages');
      if (outages.length === 0) {
        container.innerHTML = '<div class="no-outages">✅ Aucune coupure de 2+ minutes</div>';
      } else {
        container.innerHTML = `
          <h3>Coupures (${outages.length})</h3>
          ${outages.map(o => `
            <div class="outage">
              <div class="outage-duration">${o.duration}</div>
              <div>${o.start} → ${o.end}</div>
            </div>
          `).join('')}
        `;
      }
      document.getElementById('loading')?.remove();
    }

    async function refresh() {
      const data = await getData();
      renderStatus(data);
      renderChart(data.history);
      renderHours();
      renderOutages(data.history);
    }

    refresh();
    setInterval(refresh, 60000); // 1 minute
  </script>
</body>
</html>
